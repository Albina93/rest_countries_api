<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/df96cd7dea.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="./js_folder/api.js" type="module"></script>
    <script defer src="./js_folder/main.js" type="module"></script>

    <title>REST Countries API</title>
  </head>
  <body>
    <header>
      <nav class="nav_container">
        <div class="logo">
          <h3>Where in the world?</h3>
        </div>
        <button id="dark_mode_btn" class="dark_mode">
          <i class="fa-regular fa-moon"></i> Dark mode
        </button>
      </nav>
    </header>
    <main>
      <div class="user_inputs">
        <div class="search_box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            id="search_box"
            placeholder="Search for a country..."
          />
        </div>
        <div class="dropdown">
          <div class="dropdown-selected">
            Filter by Region
            <i class="fa-solid fa-angle-down"></i>
          </div>

          <div class="dropdown-options">
            <div>Africa</div>
            <div>America</div>
            <div>Asia</div>
            <div>Europe</div>
            <div>Oceania</div>
          </div>
        </div>
      </div>

      <div class="container" id="country_list_container"></div>

      <!-- <div id="detail_country_container" class="detail_country_container"></div> -->
    </main>
  </body>
</html>
