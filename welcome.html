<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <title>Where in the World?</title>
  </head>
  <body>
    <div class="welcome_page">
      <div class="welcome_content">
        
        <h1 class="welcome_title">Where in the World..?</h1>
        <p class="welcome_description">
          Discover 197 countries across 7 continents. Explore flags, capitals,
          populations, languages, currencies and border countries — all in one
          place.
        </p>
        <!-- Stats -->
        <div class="welcome_info">
          <div class="info_card">
            <span class="info_number">197</span>
            <span class="info_label">countries</span>
          </div>
          <div class="info_card">
          <span class="info_number">7</span>
            <span class="info_label">continents</span>
          </div>
          <div class="info_card">
            <span class="info_number">7,000+</span>
            <span class="info_label">languages</span>
          </div>
          <div class="info_card">
            <span class="info_number">8B+</span>
            <span class="info_label">people</span>
          </div>
        </div>

        <!-- Explore button -->
        <a href="./index.html" class="explore_btn">
          Explore countries &#8594;
        </a>
      </div>
    </div>
      </div>
    </div>
  </body>
</html>
